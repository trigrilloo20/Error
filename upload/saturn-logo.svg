<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bf00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9900ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring -->
  <ellipse cx="100" cy="100" rx="85" ry="25" fill="none" stroke="url(#neonPurple)" stroke-width="6" filter="url(#glow)" transform="rotate(-20, 100, 100)"/>
  
  <!-- Inner ring -->
  <ellipse cx="100" cy="100" rx="70" ry="18" fill="none" stroke="url(#neonPurple)" stroke-width="4" filter="url(#glow)" transform="rotate(-20, 100, 100)"/>
  
  <!-- Planet body -->
  <circle cx="100" cy="100" r="40" fill="url(#neonPurple)" filter="url(#glow)"/>
  
  <!-- Planet highlight -->
  <ellipse cx="90" cy="85" rx="15" ry="10" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Ring in front -->
  <path d="M 35 95 Q 100 70 165 95" fill="none" stroke="url(#neonPurple)" stroke-width="5" filter="url(#glow)"/>
  
  <!-- Small stars -->
  <circle cx="30" cy="40" r="2" fill="#bf00ff" filter="url(#glow)"/>
  <circle cx="170" cy="50" r="2" fill="#bf00ff" filter="url(#glow)"/>
  <circle cx="150" cy="160" r="2" fill="#bf00ff" filter="url(#glow)"/>
  <circle cx="45" cy="155" r="1.5" fill="#bf00ff" filter="url(#glow)"/>
</svg>